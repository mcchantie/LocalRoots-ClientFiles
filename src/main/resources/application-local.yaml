#Add to Railway
#AWS_ACCESS_KEY_ID=<development access key ID>
#AWS_SECRET_ACCESS_KEY=<development secret access key>
#AWS_REGION=us-east-2
#CLIENT_FILES_S3_BUCKET=<exact development bucket name>

storage:
  s3:
    bucket: ${CLIENT_FILES_S3_BUCKET_DEV}
    region: ${AWS_REGION:us-east-2}

client-files:
  auth:
    admin-username: ${CLIENT_FILES_ADMIN_USERNAME:admin}
    admin-password: ${CLIENT_FILES_ADMIN_PASSWORD:local-development-only}
    tenant-id: ${CLIENT_FILES_TENANT_ID:11111111-1111-1111-1111-111111111111}
    jwt-secret-base64: ${CLIENT_FILES_JWT_SECRET_BASE64:bG9jYWwtZGV2ZWxvcG1lbnQtand0LXNlY3JldC1vbmx5LTMyaA==}
    jwt-issuer: client-files-api-local
    access-token-ttl: 8h
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:5173
    allowed-origin-patterns: []
  security:
    allow-tenant-header: false
    allow-unverified-contact-ids: false
    allow-unverified-estimate-ids: false

spring:
  datasource:
    url: ${LOCALROOTS_DEV_DB_URL}
    username: ${LOCALROOTS_DEV_DB_USER}
    password: ${LOCALROOTS_DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

server:
  port: 8080

logging:
  file:
    name: logs/localroots-clientfiles.log
