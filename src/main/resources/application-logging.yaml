logging:
  level:
    root: INFO
    com.localroots.clientfiles: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.hibernate.orm.jdbc.bind: WARN
  file:
    name: logs/localroots-clientfiles.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId:-na}] [%X{tenant:-na}] %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] [%X{correlationId:-na}] [%X{tenant:-na}] %logger{36} - %msg%n"
