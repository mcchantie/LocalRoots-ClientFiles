spring:
  config:
    activate:
      on-profile: production
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

client-files:
  auth:
    admin-username: ${CLIENT_FILES_ADMIN_USERNAME}
    admin-password: ${CLIENT_FILES_ADMIN_PASSWORD}
    tenant-id: ${CLIENT_FILES_TENANT_ID}
    jwt-secret-base64: ${CLIENT_FILES_JWT_SECRET_BASE64}
    jwt-issuer: ${CLIENT_FILES_JWT_ISSUER:client-files-api}
    access-token-ttl: ${CLIENT_FILES_ACCESS_TOKEN_TTL:8h}
  security:
    allow-tenant-header: false
    allow-unverified-contact-ids: false
    allow-unverified-estimate-ids: false
  cors:
    allowed-origins: ${CLIENT_FILES_ALLOWED_ORIGINS:}
    allowed-origin-patterns: ${CLIENT_FILES_ALLOWED_ORIGIN_PATTERNS:}

server:
  forward-headers-strategy: framework
