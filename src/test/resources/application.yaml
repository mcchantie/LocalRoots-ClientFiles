spring:
  application:
    name: client-files
  config:
    import: optional:classpath:application-logging.yaml
  datasource:
    url: ${LOCALROOTS_DEV_DB_URL}
    username: ${LOCALROOTS_DEV_DB_USER}
    password: ${LOCALROOTS_DEV_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: false
  jpa:
    open-in-view: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

server:
  shutdown: graceful
  error:
    include-message: never

storage:
  s3:
    bucket: ${CLIENT_FILES_S3_BUCKET_DEV}
    region: ${AWS_REGION:us-east-2}
    upload-url-ttl: ${CLIENT_FILES_UPLOAD_URL_TTL:15m}
    download-url-ttl: ${CLIENT_FILES_DOWNLOAD_URL_TTL:5m}
    max-file-size: ${CLIENT_FILES_MAX_FILE_SIZE:500MB}
    allowed-content-types: image/jpeg,image/png,image/webp,image/heic,image/heif,application/pdf,video/mp4,video/quicktime

client-files:
  auth:
    admin-username: test-admin
    admin-password: test-password-only
    tenant-id: 11111111-1111-1111-1111-111111111111
    jwt-secret-base64: bG9jYWwtZGV2ZWxvcG1lbnQtand0LXNlY3JldC1vbmx5LTMyaA==
    jwt-issuer: client-files-api-test
    access-token-ttl: 1h
  cors:
    allowed-origins:
      - http://localhost:5173
    allowed-origin-patterns: []
  security:
    allow-tenant-header: false
    allow-unverified-contact-ids: false
    allow-unverified-estimate-ids: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
